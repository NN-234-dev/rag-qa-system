# ============================================
# Docker Compose — 一键启动 Ollama + RAG 应用
# ============================================
#
# 使用方式:
#   1. docker compose up -d          # 启动所有服务
#   2. bash setup-models.sh          # 首次运行: 拉取 AI 模型
#   3. 浏览器打开 http://localhost:8501
#
# GPU 加速:
#   取消 ollama 服务下的 deploy 注释 (需要 nvidia-docker)
# ============================================

services:
  # ── Ollama 模型服务 ──
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    volumes:
      - ollama_data:/root/.ollama          # 持久化模型文件
    ports:
      - "11434:11434"
    restart: unless-stopped
    # GPU 加速 (需要安装 nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── RAG 应用服务 ──
  rag-app:
    build: .
    container_name: rag-app
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434/v1   # 覆盖 localhost，指向 Ollama 容器
      - HF_ENDPOINT=https://hf-mirror.com         # HuggingFace 国内镜像
    volumes:
      - rag_data:/app/data                        # 上传文件 + ChromaDB + SQLite
      - hf_cache:/root/.cache/huggingface         # 嵌入模型缓存
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  rag_data:
  hf_cache:
